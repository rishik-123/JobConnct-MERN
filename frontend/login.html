<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Poppins", Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR - matching Network.html */
        nav { background: #2d2d2d; padding: 15px 0; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15); border-radius: 0 0 10px 10px; }
        nav ul { list-style: none; display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: white; font-size: 16px; padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
        nav ul li a:hover { background: #ffb947; color: #000; }

        /* FORM CONTAINER */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }
        .login-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d2d2d;
            font-weight: 700;
            font-size: 28px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e1e1e1;
            outline: none;
            font-family: "Poppins", sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        .form-group input:focus {
            border-color: #ffb947;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 185, 71, 0.1);
        }
        .form-group small {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #888;
        }

        .form-group-check {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .form-group-check input { margin-right: 10px; cursor: pointer; }
        .form-group-check label { font-size: 14px; color: #555; cursor: pointer; }

        button {
            width: 100%;
            background: #2d2d2d;
            border: none;
            padding: 14px 0;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(45, 45, 45, 0.2);
        }
        button:hover {
            background: #ffb947;
            color: #000;
            box-shadow: 0 8px 20px rgba(255, 185, 71, 0.3);
            transform: translateY(-2px);
        }
    </style>
<script src="config.js"></script></head>
<body>

    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about us.html">About Us</a></li>
            <li><a href="Upload Resume.html">Upload Resume</a></li>
            <li><a href="Network.html">Network With Peers</a></li>
            <li><a href="achievements.html">Post achievements here</a></li>
            <li><a href="hackathon.html">Hackathons</a></li>
            <li><a href="pro.html">Subscribe to Pro Version</a></li>
            <li><a href="login.html">Click to Login here</a></li>
            <li><a href="register.html">Click here to Register</a></li>
        </ul>
    </nav>

    <!-- LOGIN FORM CENTERED -->
    <div class="login-wrapper">
        <div class="login-container">
            <h2>Login</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                    <input type="email" id="exampleInputEmail1" name="exampleInputEmail1" required>
                    <small>We'll never share your email with anyone else.</small>
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1">Password</label>
                    <input type="password" id="exampleInputPassword1" name="exampleInputPassword1" required>
                </div>
                <div class="form-group-check">
                    <input type="checkbox" id="exampleCheck1">
                    <label for="exampleCheck1">Remember me</label>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="animations.js"></script>
</body>
</html>

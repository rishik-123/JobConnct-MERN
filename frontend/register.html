<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Poppins", Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR - matching Network.html */
        nav { background: #2d2d2d; padding: 15px 0; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15); border-radius: 0 0 10px 10px; }
        nav ul { list-style: none; display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: white; font-size: 16px; padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
        nav ul li a:hover { background: #ffb947; color: #000; }

        /* FORM CONTAINER */
        .form-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        form {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }
        form:hover {
            transform: translateY(-5px);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #2d2d2d;
            font-weight: 700;
            font-size: 28px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e1e1e1;
            outline: none;
            font-family: "Poppins", sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        .form-group input:focus {
            border-color: #ffb947;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 185, 71, 0.1);
        }

        /* TWO FIELDS SIDE BY SIDE */
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            background: #2d2d2d;
            border: none;
            padding: 14px 0;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(45, 45, 45, 0.2);
            margin-top: 10px;
        }
        button:hover {
            background: #ffb947;
            color: #000;
            box-shadow: 0 8px 20px rgba(255, 185, 71, 0.3);
            transform: translateY(-2px);
        }
        
        @media (max-width: 500px) {
            .row { flex-direction: column; gap: 0; }
        }
    </style>
<script src="config.js"></script>`n</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about us.html">About Us</a></li>
            <li><a href="Upload Resume.html">Upload Resume</a></li>
            <li><a href="Network.html">Network With Peers</a></li>
            <li><a href="achievements.html">Achievements</a></li>
            <li><a href="hackathon.html">Hackathons</a></li>
            <li><a href="pro.html">Pro Version</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>
    
    <!-- FORM CENTERED -->
    <div class="form-wrapper">
        <form action="/register" method="POST">
            <h2 class="form-title">Create an Account</h2>
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="clientnamefirst" name="clientnamefirst" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="clientnamelast" name="clientnamelast" required>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Job Profile</label>
                    <input type="text" id="JobProfile" name="JobProfile">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="contactno" name="contactno">
                </div>
            </div>
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="exampleInputEmail1" name="exampleInputEmail1">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="exampleInputPassword1" name="exampleInputPassword1">
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="animations.js"></script>
</body>
</html>
